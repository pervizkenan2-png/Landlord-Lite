<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landlord Lite - Eigene Vorlagen</title>

  <script>
    const token = localStorage.getItem("token");
    if (!token) {
      window.location.replace("./Login.html");
    }
  </script>

  <script src="config.js"></script>

  <style>
    :root {
      --green: #2e7d32;
      --green-dark: #205624;
      --red: #c62828;
      --bg: #f4f4f4;
      --card-radius: 8px;
      --shadow-soft: 0 2px 8px rgba(0,0,0,0.12);
      --shadow-strong: 0 6px 18px rgba(0,0,0,0.25);
    }
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      background-color: var(--bg);
      color: #222;
    }

    /* SIDEBAR */
    .sidebar {
      width: 230px;
      background: linear-gradient(180deg, #2e7d32, #1b5e20);
      color: #fff;
      min-height: 100vh;
      padding: 20px 18px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.2);
      position: sticky;
      top: 0;
    }
    .sidebar h1 {
      margin: 0 0 16px;
      font-size: 1.4rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar h1 span.logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 6px;
      background: rgba(255,255,255,0.18);
      font-size: 16px;
    }
    .sidebar small {
      opacity: 0.8;
      display: block;
      margin-bottom: 14px;
      font-size: 0.8rem;
    }
    .sidebar-nav {
      margin-top: 20px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      color: #fff;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }
    .nav-item span.icon { font-size: 1.1rem; }
    .nav-item.active {
      background: rgba(255,255,255,0.22);
      box-shadow: var(--shadow-soft);
    }
    .nav-item:hover {
      box-shadow: var(--shadow-strong);
      transform: translateY(-1px);
    }

    /* Submenu unter Mieterverwaltung */
    .submenu {
      margin-left: 10px;
      display: none; /* Start: zu */
    }
    .submenu a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      margin-bottom: 4px;
      border-radius: 8px;
      text-decoration: none;
      color: #fff;
      font-size: 0.85rem;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }
    .submenu a:hover {
      background: rgba(255,255,255,0.18);
      box-shadow: var(--shadow-soft);
      transform: translateY(-0.5px);
    }
    .submenu .icon {
      font-size: 1rem;
    }

    /* CONTENT */
    .content {
      flex: 1;
      padding: 22px 26px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      flex-wrap: wrap;
    }
    .header-row h2 {
      margin: 0;
      font-size: 1.5rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #e0f2f1;
      color: #00695c;
      font-size: 0.8rem;
    }
    .badge span.dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #26a69a;
    }

    /* CARDS / FORM */
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 16px 18px;
      box-shadow: var(--shadow-soft);
      margin-top: 18px;
    }
    .card-title {
      margin: 0 0 10px;
      font-size: 1.05rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 420px;
    }
    .form-row-2 {
      display: flex;
      gap: 10px;
    }
    .form-row-2 > * { flex: 1; }

    label {
      font-size: 0.8rem;
      margin-bottom: 3px;
      display: block;
      color: #555;
    }
    input, select {
      width: 100%;
      padding: 8px 9px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 0.9rem;
      font-family: inherit;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 2px rgba(46,125,50,0.15);
    }

    button.primary {
      background-color: var(--green);
      border: none;
      color: #fff;
      padding: 9px 10px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.95rem;
      margin-top: 4px;
      transition: background 0.12s ease, transform 0.1s ease, box-shadow 0.12s ease;
    }
    button.primary:hover {
      background-color: var(--green-dark);
      box-shadow: var(--shadow-soft);
      transform: translateY(-0.5px);
    }
    button.primary:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .section-title {
      margin-top: 22px;
      margin-bottom: 10px;
      font-size: 1.15rem;
    }

    /* FILTER / STATS */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      max-width: 520px;
      margin-bottom: 14px;
    }
    .filter-bar input,
    .filter-bar select {
      padding: 8px 9px;
      border-radius: 7px;
      border: 1px solid #ccc;
      font-size: 0.9rem;
      flex: 1;
      min-width: 150px;
    }
    .small-label {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 4px;
    }
    .stats-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .stat-pill {
      padding: 6px 9px;
      border-radius: 999px;
      background: #e8f5e9;
      color: #1b5e20;
      font-size: 0.8rem;
    }
    .stat-pill.red {
      background: #ffebee;
      color: #b71c1c;
    }

    /* TENANT LIST */
    #tenantList { margin-top: 6px; }

    .tenant-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      margin-bottom: 9px;
      border-radius: 10px;
      color: #fff;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .tenant-card.paid { background: var(--green); }
    .tenant-card.unpaid { background: var(--red); }
    .tenant-card:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-strong);
    }
    .tenant-main {
      flex: 1;
      padding-right: 10px;
      font-size: 0.9rem;
    }
    .tenant-main strong { font-size: 1rem; }
    .tenant-meta {
      margin-top: 2px;
      opacity: 0.9;
    }
    .tenant-status {
      margin-top: 4px;
      font-size: 0.8rem;
      opacity: 0.95;
    }
    .tenant-status span.badge-inline {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      font-size: 0.75rem;
    }

    .tenant-actions {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-end;
      min-width: 130px;
    }
    .btn-small,
    .btn-icon {
      border: none;
      border-radius: 999px;
      padding: 4px 8px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      cursor: pointer;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .btn-small:hover,
    .btn-icon:hover {
      background: rgba(255,255,255,0.35);
    }
    .btn-danger {
      background: rgba(244,67,54,0.35);
    }
    .btn-danger:hover {
      background: rgba(244,67,54,0.6);
    }

    /* MODALS */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }
    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 16px 18px;
      width: 360px;
      max-width: 92vw;
      box-shadow: 0 10px 28px rgba(0,0,0,0.35);
      animation: popIn 0.18s ease-out;
    }
    @keyframes popIn {
      from { transform: scale(0.94); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .modal header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .modal header h3 {
      margin: 0;
      font-size: 1.1rem;
    }
    .modal-close {
      border: none;
      background: transparent;
      font-size: 1.1rem;
      cursor: pointer;
      color: #555;
    }
    .modal footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 10px;
    }
    .btn-secondary {
      border-radius: 7px;
      border: none;
      padding: 7px 10px;
      font-size: 0.85rem;
      background: #e0e0e0;
      cursor: pointer;
    }
    .btn-secondary:hover { background: #d5d5d5; }
    .btn-primary {
      border-radius: 7px;
      border: none;
      padding: 7px 11px;
      font-size: 0.85rem;
      background: var(--green);
      color: #fff;
      cursor: pointer;
    }
    .btn-primary:hover { background: var(--green-dark); }

    /* Messages */
    #msg {
      margin-top: 8px;
      font-size: 0.85rem;
    }
    #msg.error { color: #c62828; }
    #msg.success { color: #2e7d32; }

    @media (max-width: 800px) {
      body { flex-direction: column; }
      .sidebar {
        width: 100%;
        min-height: auto;
        position: static;
        box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        margin-bottom: 8px;
      }
      .content { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <!-- SIDEBAR -->
<aside class="sidebar">
  <h1><span class="logo">🏡</span> Landlord Lite</h1>
  <small>Mieterverwaltung</small>

  <nav class="sidebar-nav">

    <!-- Dropdown Hauptpunkt -->
    <div class="nav-item" onclick="toggleSidebarMenu()">
      <span class="icon">📁</span>
      <span>Mieterverwaltung</span>
      <span id="menuArrow" style="margin-left:auto;font-size:0.85rem;">▼</span>
    </div>

    <!-- Untermenü -->
    <div id="submenu" class="submenu">
      <a href="index.html">
        <span class="icon">👥</span>

      </a>

      <a href="mahnung.html">

      <a href="mieterhoehung.html">

      <a href="import.html">
        <span class="icon">📥</span>

      </a>

    <!-- Fester Punkt -->

    </a>

  </nav>
</aside>

    <main class="content">
      <h1 class="page-title">Eigene Vorlagen</h1>
      <div id="msg" class="msg"></div>

      <div class="top-grid">
        <section class="card">
          <h3>Vorlagen</h3>

          <div class="btn-row">
            <button id="newTemplateBtn" class="btn btn-primary">+ Neue Vorlage</button>
          </div>

          <div id="templateList" class="template-list"></div>
        </section>

        <section class="card">
          <div class="editor-grid">
            <div>
              <h3>Vorlage bearbeiten</h3>

              <div class="field">
                <label for="templateTitle">Titel</label>
                <input id="templateTitle" type="text" placeholder="z.B. 1. Mahnung Standard" />
              </div>

              <div class="field">
                <label for="tenantSelect">Mieter für Live-Vorschau</label>
                <select id="tenantSelect">
                  <option value="">— Mieter auswählen —</option>
                </select>
              </div>

              <div id="tenantInfo" class="tenant-info" style="display:none;"></div>

              <div class="small">Platzhalter einfügen:</div>
              <div class="placeholder-row">
                <button class="placeholder-chip" type="button" data-placeholder="{MieterName}">{MieterName}</button>
                <button class="placeholder-chip" type="button" data-placeholder="{Wohnung}">{Wohnung}</button>
                <button class="placeholder-chip" type="button" data-placeholder="{Mietbetrag}">{Mietbetrag}</button>
                <button class="placeholder-chip" type="button" data-placeholder="{Faelligkeit}">{Faelligkeit}</button>
                <button class="placeholder-chip" type="button" data-placeholder="{IBAN}">{IBAN}</button>
                <button class="placeholder-chip" type="button" data-placeholder="{Status}">{Status}</button>
                <button class="placeholder-chip" type="button" data-placeholder="{UeberfaelligTage}">{UeberfaelligTage}</button>
                <button class="placeholder-chip" type="button" data-placeholder="{VermieterName}">{VermieterName}</button>
                <button class="placeholder-chip" type="button" data-placeholder="{AdresseVermieter}">{AdresseVermieter}</button>
                <button class="placeholder-chip" type="button" data-placeholder="{Kontoinformationen}">{Kontoinformationen}</button>
                <button class="placeholder-chip" type="button" data-placeholder="{Heute}">{Heute}</button>
              </div>

              <div class="field">
                <label for="templateContent">Vorlageninhalt</label>
                <textarea id="templateContent" placeholder="Schreibe hier deine Vorlage..."></textarea>
              </div>

              <div class="btn-row">
                <button id="saveTemplateBtn" class="btn btn-primary">Vorlage speichern</button>
                <button id="deleteTemplateBtn" class="btn btn-danger">Vorlage löschen</button>
              </div>
            </div>

            <div class="preview-box">
              <h3>Live-Vorschau</h3>

              <div class="field">
                <label for="previewText">Generierter Text</label>
                <textarea id="previewText" readonly placeholder="Hier erscheint deine fertige Vorschau..."></textarea>
              </div>

              <div class="btn-row">
                <button id="copyPreviewBtn" class="btn btn-primary">Vorschau kopieren</button>
                <button id="downloadPreviewBtn" class="btn btn-secondary">Als TXT speichern</button>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>
<script>
  window.toggleSidebarMenu = function () {
    const menu = document.getElementById("submenu");
    const arrow = document.getElementById("menuArrow");
    if (!menu) return;

    const isOpen = menu.style.display === "block";
    menu.style.display = isOpen ? "none" : "block";
    if (arrow) arrow.textContent = isOpen ? "▼" : "▲";
  };

  document.addEventListener("DOMContentLoaded", () => {
    const token = localStorage.getItem("token");
    if (!token) {
      window.location.replace("./Login.html");
      return;
    }

    const _fetch = window.fetch.bind(window);
    window.fetch = function (url, options = {}) {
      const currentToken = localStorage.getItem("token");
      options.headers = {
        ...(options.headers || {}),
        ...(currentToken ? { Authorization: "Bearer " + currentToken } : {})
      };
      return _fetch(url, options);
    };

    const TENANTS_URL = window.TENANTS_URL;
    const TEMPLATES_KEY = "llp_custom_templates_v2";
    const LANDLORD_KEY = "llp_landlord_data_v1";
    const ACTIVE_TENANT_KEY = "llp_active_tenant_v1";

    const msgEl = document.getElementById("msg");
    const templateListEl = document.getElementById("templateList");
    const templateTitleEl = document.getElementById("templateTitle");
    const templateContentEl = document.getElementById("templateContent");
    const previewTextEl = document.getElementById("previewText");
    const tenantSelectEl = document.getElementById("tenantSelect");
    const tenantInfoEl = document.getElementById("tenantInfo");

    const newTemplateBtn = document.getElementById("newTemplateBtn");
    const saveTemplateBtn = document.getElementById("saveTemplateBtn");
    const deleteTemplateBtn = document.getElementById("deleteTemplateBtn");
    const copyPreviewBtn = document.getElementById("copyPreviewBtn");
    const downloadPreviewBtn = document.getElementById("downloadPreviewBtn");

    let templates = [];
    let tenantsCache = [];
    let activeTemplateId = null;

    function showMsg(text, type = "error") {
      msgEl.textContent = text;
      msgEl.className = "msg " + (type === "success" ? "success" : "error");
    }

    function clearMsg() {
      msgEl.textContent = "";
      msgEl.className = "msg";
    }

    function getTenantId(t) {
      return t?._id || t?.id || "";
    }

    function formatDate(date) {
      return new Intl.DateTimeFormat("de-DE").format(date);
    }

    function getLatestDueDate(dueDay) {
      const today = new Date();
      const year = today.getFullYear();
      const month = today.getMonth();

      let lastDayCurrentMonth = new Date(year, month + 1, 0).getDate();
      let clampedCurrent = Math.min(Number(dueDay || 1), lastDayCurrentMonth);
      let dueDate = new Date(year, month, clampedCurrent);

      if (today.getDate() < Number(dueDay || 1)) {
        const prevLastDay = new Date(year, month, 0).getDate();
        const clampedPrev = Math.min(Number(dueDay || 1), prevLastDay);
        dueDate = new Date(year, month - 1, clampedPrev);
      }

      return dueDate;
    }

    function getOverdueDays(tenant) {
      if (!tenant || tenant.status === "paid") return 0;

      const dueDay = Number(tenant.dueDay || 0);
      if (!dueDay) return 0;

      const dueDate = getLatestDueDate(dueDay);
      const today = new Date();

      const a = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const b = new Date(dueDate.getFullYear(), dueDate.getMonth(), dueDate.getDate());

      const diff = Math.floor((a - b) / 86400000);
      return diff > 0 ? diff : 0;
    }

    function loadTemplates() {
      const raw = localStorage.getItem(TEMPLATES_KEY);
      if (!raw) {
        templates = [];
        return;
      }

      try {
        const parsed = JSON.parse(raw);
        templates = Array.isArray(parsed) ? parsed : [];
      } catch (_) {
        templates = [];
      }
    }

    function saveTemplatesToStorage() {
      localStorage.setItem(TEMPLATES_KEY, JSON.stringify(templates));
    }

    function renderTemplateList() {
      templateListEl.innerHTML = "";

      if (!Array.isArray(templates) || templates.length === 0) {
        templateListEl.innerHTML = '<div class="empty-state">Noch keine Vorlagen vorhanden.</div>';
        return;
      }

      const sortedTemplates = [...templates].sort((a, b) => {
        return new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0);
      });

      sortedTemplates.forEach((template) => {
        const item = document.createElement("div");
        item.className =
          "template-item" +
          (String(template.id) === String(activeTemplateId) ? " active" : "");

        item.innerHTML = `
          <div class="template-title">${template.title || "Ohne Titel"}</div>
          <div class="template-meta">
            Zuletzt geändert: ${template.updatedAt ? formatDate(new Date(template.updatedAt)) : "-"}
          </div>
        `;

        item.addEventListener("click", () => openTemplate(template.id));
        templateListEl.appendChild(item);
      });
    }

    function newTemplate() {
      clearMsg();

      if (!Array.isArray(templates)) {
        templates = [];
      }

      const now = new Date().toISOString();
      const draft = {
        id: "tpl_" + Date.now(),
        title: "Neue Vorlage",
        content: "",
        createdAt: now,
        updatedAt: now
      };

      templates.unshift(draft);
      activeTemplateId = draft.id;

      saveTemplatesToStorage();
      renderTemplateList();

      templateTitleEl.value = draft.title;
      templateContentEl.value = "";
      previewTextEl.value = "";

      renderPreview();

      templateTitleEl.focus();
      templateTitleEl.select();

      showMsg("Neue Vorlage erstellt.", "success");
    }

    function openTemplate(id) {
      const template = templates.find(t => String(t.id) === String(id));
      if (!template) return;

      activeTemplateId = template.id;
      templateTitleEl.value = template.title || "";
      templateContentEl.value = template.content || "";
      renderTemplateList();
      renderPreview();
      clearMsg();
    }

    function saveTemplate() {
      const title = templateTitleEl.value.trim();
      const content = templateContentEl.value;

      if (!title) {
        showMsg("Bitte einen Titel eingeben.");
        return;
      }

      if (!content.trim()) {
        showMsg("Bitte einen Vorlageninhalt eingeben.");
        return;
      }

      const now = new Date().toISOString();

      if (activeTemplateId) {
        const existing = templates.find(t => String(t.id) === String(activeTemplateId));
        if (existing) {
          existing.title = title;
          existing.content = content;
          existing.updatedAt = now;
        }
      } else {
        const newItem = {
          id: "tpl_" + Date.now(),
          title,
          content,
          createdAt: now,
          updatedAt: now
        };
        templates.unshift(newItem);
        activeTemplateId = newItem.id;
      }

      saveTemplatesToStorage();
      renderTemplateList();
      renderPreview();
      showMsg("Vorlage gespeichert.", "success");
    }

    function deleteTemplate() {
      if (!activeTemplateId) {
        showMsg("Bitte zuerst eine Vorlage auswählen.");
        return;
      }

      const template = templates.find(t => String(t.id) === String(activeTemplateId));
      const title = template?.title || "diese Vorlage";

      if (!confirm(`Vorlage "${title}" wirklich löschen?`)) return;

      templates = templates.filter(t => String(t.id) !== String(activeTemplateId));
      saveTemplatesToStorage();
      activeTemplateId = null;

      templateTitleEl.value = "";
      templateContentEl.value = "";
      previewTextEl.value = "";

      renderTemplateList();
      renderPreview();
      showMsg("Vorlage gelöscht.", "success");
    }

    function getSelectedTenant() {
      const id = tenantSelectEl.value;
      return tenantsCache.find(t => String(getTenantId(t)) === String(id)) || null;
    }

    function renderTenantInfo() {
      const tenant = getSelectedTenant();

      if (!tenant) {
        tenantInfoEl.style.display = "none";
        tenantInfoEl.innerHTML = "";
        return;
      }

      tenantInfoEl.style.display = "block";
      tenantInfoEl.innerHTML = `
        <strong>${tenant.name || "-"}</strong>
        Wohnung: ${tenant.unit || "-"} | Miete: ${tenant.rent ?? 0} € | Status: ${tenant.status === "paid" ? "Bezahlt" : "Nicht bezahlt"}
      `;
    }

    function populateTenantSelect() {
      const previousValue = tenantSelectEl.value;
      const rawActive = localStorage.getItem(ACTIVE_TENANT_KEY);
      let activeId = "";

      if (rawActive) {
        try {
          const activeTenant = JSON.parse(rawActive);
          activeId = String(getTenantId(activeTenant));
        } catch (_) {}
      }

      tenantSelectEl.innerHTML = '<option value="">— Mieter auswählen —</option>';

      tenantsCache.forEach(t => {
        const option = document.createElement("option");
        option.value = String(getTenantId(t));
        option.textContent = `${t.name || "-"} | ${t.unit || "-"} | ${t.rent ?? 0} €`;
        tenantSelectEl.appendChild(option);
      });

      if (activeId && tenantsCache.some(t => String(getTenantId(t)) === activeId)) {
        tenantSelectEl.value = activeId;
      } else if (previousValue && tenantsCache.some(t => String(getTenantId(t)) === previousValue)) {
        tenantSelectEl.value = previousValue;
      }

      renderTenantInfo();
      renderPreview();
    }

    function getLandlordData() {
      try {
        return JSON.parse(localStorage.getItem(LANDLORD_KEY) || "{}");
      } catch (_) {
        return {};
      }
    }

    function getPlaceholderMap() {
      const tenant = getSelectedTenant();
      const landlord = getLandlordData();

      return {
        "{MieterName}": tenant?.name || "",
        "{Wohnung}": tenant?.unit || "",
        "{Mietbetrag}": tenant ? `${tenant.rent ?? 0} €` : "",
        "{Faelligkeit}": tenant ? formatDate(getLatestDueDate(tenant.dueDay)) : "",
        "{IBAN}": tenant?.iban || "",
        "{Status}": tenant ? (tenant.status === "paid" ? "Bezahlt" : "Nicht bezahlt") : "",
        "{UeberfaelligTage}": tenant ? String(getOverdueDays(tenant)) : "",
        "{VermieterName}": landlord.name || "",
        "{AdresseVermieter}": landlord.address || "",
        "{Kontoinformationen}": landlord.payment || "",
        "{Heute}": formatDate(new Date())
      };
    }

    function renderPreview() {
      let text = templateContentEl.value || "";
      const placeholderMap = getPlaceholderMap();

      Object.entries(placeholderMap).forEach(([key, value]) => {
        text = text.split(key).join(value);
      });

      previewTextEl.value = text;
    }

    function insertAtCursor(text) {
      const start = templateContentEl.selectionStart || 0;
      const end = templateContentEl.selectionEnd || 0;
      const current = templateContentEl.value;

      templateContentEl.value =
        current.substring(0, start) +
        text +
        current.substring(end);

      templateContentEl.focus();
      const pos = start + text.length;
      templateContentEl.setSelectionRange(pos, pos);
      renderPreview();
    }

    async function copyPreview() {
      const text = previewTextEl.value.trim();
      if (!text) {
        showMsg("Es gibt noch keine Vorschau.");
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        showMsg("Vorschau kopiert.", "success");
      } catch (_) {
        showMsg("Kopieren nicht möglich.");
      }
    }

    function downloadPreview() {
      const text = previewTextEl.value.trim();
      if (!text) {
        showMsg("Es gibt noch keine Vorschau.");
        return;
      }

      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "vorlage.txt";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    async function loadTenants() {
      if (!TENANTS_URL) {
        showMsg("config.js fehlt oder TENANTS_URL ist leer.");
        tenantSelectEl.innerHTML = '<option value="">Backend nicht erreichbar</option>';
        return;
      }

      try {
        const res = await fetch(TENANTS_URL, { method: "GET" });

        if (res.status === 401) {
          localStorage.removeItem("token");
          window.location.replace("./Login.html");
          return;
        }

        if (!res.ok) {
          const txt = await res.text();
          showMsg("Fehler beim Laden der Mieter: " + txt);
          tenantSelectEl.innerHTML = '<option value="">Backend nicht erreichbar</option>';
          return;
        }

        tenantsCache = await res.json();
        populateTenantSelect();
        clearMsg();
      } catch (err) {
        console.error("VORLAGE LOAD TENANTS ERROR:", err);
        showMsg("Netzwerkfehler beim Laden der Mieter: " + err.message);
        tenantSelectEl.innerHTML = '<option value="">Backend nicht erreichbar</option>';
      }
    }

    document.querySelectorAll("[data-placeholder]").forEach(btn => {
      btn.addEventListener("click", () => {
        insertAtCursor(btn.dataset.placeholder);
      });
    });

    newTemplateBtn.addEventListener("click", newTemplate);
    saveTemplateBtn.addEventListener("click", saveTemplate);
    deleteTemplateBtn.addEventListener("click", deleteTemplate);
    copyPreviewBtn.addEventListener("click", copyPreview);
    downloadPreviewBtn.addEventListener("click", downloadPreview);

    templateTitleEl.addEventListener("input", renderPreview);
    templateContentEl.addEventListener("input", renderPreview);
    tenantSelectEl.addEventListener("change", () => {
      renderTenantInfo();
      renderPreview();
    });

    loadTemplates();
    renderTemplateList();
    loadTenants();

    if (templates.length) {
      openTemplate(templates[0].id);
    }
  });
</script>
  </body>
</html>
