<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landlord Lite - Mahnungen</title>

  <script>
    const token = localStorage.getItem("token");
    if (!token) {
      window.location.replace("./Login.html");
    }
  </script>

  <script src="config.js"></script>

  <style>
    :root {
      --green: #2e7d32;
      --green-dark: #205624;
      --red: #c62828;
      --bg: #f4f4f4;
      --card-radius: 8px;
      --shadow-soft: 0 2px 8px rgba(0,0,0,0.12);
      --shadow-strong: 0 6px 18px rgba(0,0,0,0.25);
    }
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      background-color: var(--bg);
      color: #222;
    }

    /* SIDEBAR */
    .sidebar {
      width: 230px;
      background: linear-gradient(180deg, #2e7d32, #1b5e20);
      color: #fff;
      min-height: 100vh;
      padding: 20px 18px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.2);
      position: sticky;
      top: 0;
    }
    .sidebar h1 {
      margin: 0 0 16px;
      font-size: 1.4rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar h1 span.logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 6px;
      background: rgba(255,255,255,0.18);
      font-size: 16px;
    }
    .sidebar small {
      opacity: 0.8;
      display: block;
      margin-bottom: 14px;
      font-size: 0.8rem;
    }
    .sidebar-nav {
      margin-top: 20px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      color: #fff;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }
    .nav-item span.icon { font-size: 1.1rem; }
    .nav-item.active {
      background: rgba(255,255,255,0.22);
      box-shadow: var(--shadow-soft);
    }
    .nav-item:hover {
      box-shadow: var(--shadow-strong);
      transform: translateY(-1px);
    }

    /* Submenu unter Mieterverwaltung */
    .submenu {
      margin-left: 10px;
      display: none; /* Start: zu */
    }
    .submenu a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      margin-bottom: 4px;
      border-radius: 8px;
      text-decoration: none;
      color: #fff;
      font-size: 0.85rem;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }
    .submenu a:hover {
      background: rgba(255,255,255,0.18);
      box-shadow: var(--shadow-soft);
      transform: translateY(-0.5px);
    }
    .submenu .icon {
      font-size: 1rem;
    }

    /* CONTENT */
    .content {
      flex: 1;
      padding: 22px 26px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      flex-wrap: wrap;
    }
    .header-row h2 {
      margin: 0;
      font-size: 1.5rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #e0f2f1;
      color: #00695c;
      font-size: 0.8rem;
    }
    .badge span.dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #26a69a;
    }

    /* CARDS / FORM */
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 16px 18px;
      box-shadow: var(--shadow-soft);
      margin-top: 18px;
    }
    .card-title {
      margin: 0 0 10px;
      font-size: 1.05rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 420px;
    }
    .form-row-2 {
      display: flex;
      gap: 10px;
    }
    .form-row-2 > * { flex: 1; }

    label {
      font-size: 0.8rem;
      margin-bottom: 3px;
      display: block;
      color: #555;
    }
    input, select {
      width: 100%;
      padding: 8px 9px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 0.9rem;
      font-family: inherit;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 2px rgba(46,125,50,0.15);
    }

    button.primary {
      background-color: var(--green);
      border: none;
      color: #fff;
      padding: 9px 10px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.95rem;
      margin-top: 4px;
      transition: background 0.12s ease, transform 0.1s ease, box-shadow 0.12s ease;
    }
    button.primary:hover {
      background-color: var(--green-dark);
      box-shadow: var(--shadow-soft);
      transform: translateY(-0.5px);
    }
    button.primary:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .section-title {
      margin-top: 22px;
      margin-bottom: 10px;
      font-size: 1.15rem;
    }

    /* FILTER / STATS */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      max-width: 520px;
      margin-bottom: 14px;
    }
    .filter-bar input,
    .filter-bar select {
      padding: 8px 9px;
      border-radius: 7px;
      border: 1px solid #ccc;
      font-size: 0.9rem;
      flex: 1;
      min-width: 150px;
    }
    .small-label {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 4px;
    }
    .stats-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .stat-pill {
      padding: 6px 9px;
      border-radius: 999px;
      background: #e8f5e9;
      color: #1b5e20;
      font-size: 0.8rem;
    }
    .stat-pill.red {
      background: #ffebee;
      color: #b71c1c;
    }

    /* TENANT LIST */
    #tenantList { margin-top: 6px; }

    .tenant-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      margin-bottom: 9px;
      border-radius: 10px;
      color: #fff;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .tenant-card.paid { background: var(--green); }
    .tenant-card.unpaid { background: var(--red); }
    .tenant-card:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-strong);
    }
    .tenant-main {
      flex: 1;
      padding-right: 10px;
      font-size: 0.9rem;
    }
    .tenant-main strong { font-size: 1rem; }
    .tenant-meta {
      margin-top: 2px;
      opacity: 0.9;
    }
    .tenant-status {
      margin-top: 4px;
      font-size: 0.8rem;
      opacity: 0.95;
    }
    .tenant-status span.badge-inline {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      font-size: 0.75rem;
    }

    .tenant-actions {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-end;
      min-width: 130px;
    }
    .btn-small,
    .btn-icon {
      border: none;
      border-radius: 999px;
      padding: 4px 8px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      cursor: pointer;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .btn-small:hover,
    .btn-icon:hover {
      background: rgba(255,255,255,0.35);
    }
    .btn-danger {
      background: rgba(244,67,54,0.35);
    }
    .btn-danger:hover {
      background: rgba(244,67,54,0.6);
    }

    /* MODALS */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }
    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 16px 18px;
      width: 360px;
      max-width: 92vw;
      box-shadow: 0 10px 28px rgba(0,0,0,0.35);
      animation: popIn 0.18s ease-out;
    }
    @keyframes popIn {
      from { transform: scale(0.94); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .modal header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .modal header h3 {
      margin: 0;
      font-size: 1.1rem;
    }
    .modal-close {
      border: none;
      background: transparent;
      font-size: 1.1rem;
      cursor: pointer;
      color: #555;
    }
    .modal footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 10px;
    }
    .btn-secondary {
      border-radius: 7px;
      border: none;
      padding: 7px 10px;
      font-size: 0.85rem;
      background: #e0e0e0;
      cursor: pointer;
    }
    .btn-secondary:hover { background: #d5d5d5; }
    .btn-primary {
      border-radius: 7px;
      border: none;
      padding: 7px 11px;
      font-size: 0.85rem;
      background: var(--green);
      color: #fff;
      cursor: pointer;
    }
    .btn-primary:hover { background: var(--green-dark); }

    /* Messages */
    #msg {
      margin-top: 8px;
      font-size: 0.85rem;
    }
    #msg.error { color: #c62828; }
    #msg.success { color: #2e7d32; }

    @media (max-width: 800px) {
      body { flex-direction: column; }
      .sidebar {
        width: 100%;
        min-height: auto;
        position: static;
        box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        margin-bottom: 8px;
      }
      .content { padding: 14px; }
    }
  </style>

</head>
<body>

   <!-- SIDEBAR -->
<aside class="sidebar">

  <small>Mieterverwaltung</small>

  <nav class="sidebar-nav">

    <!-- Dropdown Hauptpunkt -->

      <span class="icon">📁</span>

    <!-- Untermenü -->
    <div id="submenu" class="submenu">
      <a href="index.html">

    <main class="content">
      <h1 class="page-title">Mahnungen</h1>
      <div id="msg" class="msg"></div>

      <section class="card">
        <h3>Vermieterdaten</h3>

        <div class="field">
          <label for="landlordName">Name des Vermieters / der Verwaltung</label>
          <input id="landlordName" type="text" placeholder="z.B. Max Mustermann oder Muster Hausverwaltung" />
        </div>

        <div class="field">
          <label for="landlordAddress">Adresse</label>
          <input id="landlordAddress" type="text" placeholder="z.B. Musterstraße 1, 12345 Musterstadt" />
        </div>

        <div class="field">
          <label for="landlordPayment">Kontoinformationen für Zahlung</label>
          <input id="landlordPayment" type="text" placeholder="z.B. IBAN, Bankname oder Zahlungsanweisung" />
        </div>

        <button id="saveLandlordBtn" class="btn btn-primary">Vermieterdaten speichern</button>
      </section>

      <section class="card">
        <h3>Mieter auswählen & Mahnung generieren</h3>

        <div class="grid-2">
          <div class="field">
            <label for="tenantSelect">Mieter</label>
            <select id="tenantSelect">
              <option value="">— Mieter auswählen —</option>
            </select>
          </div>

          <div class="field">
            <label for="mahnungLevel">Mahnungsstufe</label>
            <select id="mahnungLevel">
              <option value="1">1. Mahnung</option>
              <option value="2">2. Mahnung</option>
              <option value="3">Letzte Mahnung</option>
            </select>
          </div>
        </div>

        <div id="tenantInfo" class="tenant-info" style="display:none;"></div>

        <div class="btn-row">
          <button id="generateSelectedBtn" class="btn btn-primary">Mahnung für ausgewählten Mieter generieren</button>
          <button id="generateAllBtn" class="btn btn-secondary">Mahnungen für alle offenen Mieter generieren</button>
        </div>
      </section>

      <section class="card">
        <h3>Generierter Mahnungstext</h3>

        <div class="field">
          <textarea id="previewText" placeholder="Hier erscheint der Mahnungstext..."></textarea>
        </div>

        <div class="btn-row">
          <button id="copyBtn" class="btn btn-primary">Text kopieren</button>
          <button id="downloadBtn" class="btn btn-secondary">Als TXT speichern</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    window.toggleSidebarMenu = function () {
      const menu = document.getElementById("submenu");
      const arrow = document.getElementById("menuArrow");
      if (!menu) return;

      const isOpen = menu.style.display === "block";
      menu.style.display = isOpen ? "none" : "block";
      if (arrow) arrow.textContent = isOpen ? "▼" : "▲";
    };

    document.addEventListener("DOMContentLoaded", () => {
      const token = localStorage.getItem("token");
      if (!token) {
        window.location.replace("./Login.html");
        return;
      }

      const _fetch = window.fetch.bind(window);
      window.fetch = function (url, options = {}) {
        const currentToken = localStorage.getItem("token");
        options.headers = {
          ...(options.headers || {}),
          ...(currentToken ? { Authorization: "Bearer " + currentToken } : {})
        };
        return _fetch(url, options);
      };

      const TENANTS_URL = window.TENANTS_URL;
      const ACTIVE_TENANT_KEY = "llp_active_tenant_v1";
      const LANDLORD_KEY = "llp_landlord_data_v1";

      const msgEl = document.getElementById("msg");
      const landlordName = document.getElementById("landlordName");
      const landlordAddress = document.getElementById("landlordAddress");
      const landlordPayment = document.getElementById("landlordPayment");
      const saveLandlordBtn = document.getElementById("saveLandlordBtn");

      const tenantSelect = document.getElementById("tenantSelect");
      const mahnungLevel = document.getElementById("mahnungLevel");
      const tenantInfo = document.getElementById("tenantInfo");
      const generateSelectedBtn = document.getElementById("generateSelectedBtn");
      const generateAllBtn = document.getElementById("generateAllBtn");
      const previewText = document.getElementById("previewText");
      const copyBtn = document.getElementById("copyBtn");
      const downloadBtn = document.getElementById("downloadBtn");

      let tenantsCache = [];

      function showMsg(text, type = "error") {
        msgEl.textContent = text;
        msgEl.className = "msg " + (type === "success" ? "success" : "error");
      }

      function clearMsg() {
        msgEl.textContent = "";
        msgEl.className = "msg";
      }

      function getTenantId(t) {
        return t?._id || t?.id || "";
      }

      function formatDate(date) {
        return new Intl.DateTimeFormat("de-DE").format(date);
      }

      function getLatestDueDate(dueDay) {
        const today = new Date();
        const year = today.getFullYear();
        const month = today.getMonth();

        let lastDayCurrentMonth = new Date(year, month + 1, 0).getDate();
        let clampedCurrent = Math.min(Number(dueDay || 1), lastDayCurrentMonth);
        let dueDate = new Date(year, month, clampedCurrent);

        if (today.getDate() < Number(dueDay || 1)) {
          const prevLastDay = new Date(year, month, 0).getDate();
          const clampedPrev = Math.min(Number(dueDay || 1), prevLastDay);
          dueDate = new Date(year, month - 1, clampedPrev);
        }

        return dueDate;
      }

      function getOverdueDays(tenant) {
        if (!tenant || tenant.status === "paid") return 0;

        const dueDay = Number(tenant.dueDay || 0);
        if (!dueDay) return 0;

        const dueDate = getLatestDueDate(dueDay);
        const today = new Date();

        const a = new Date(today.getFullYear(), today.getMonth(), today.getDate());
        const b = new Date(dueDate.getFullYear(), dueDate.getMonth(), dueDate.getDate());

        const diff = Math.floor((a - b) / 86400000);
        return diff > 0 ? diff : 0;
      }

      function loadLandlordData() {
        const raw = localStorage.getItem(LANDLORD_KEY);
        if (!raw) return;

        try {
          const data = JSON.parse(raw);
          landlordName.value = data.name || "";
          landlordAddress.value = data.address || "";
          landlordPayment.value = data.payment || "";
        } catch (_) {}
      }

      function getLandlordData() {
        return {
          name: landlordName.value.trim(),
          address: landlordAddress.value.trim(),
          payment: landlordPayment.value.trim()
        };
      }

      function saveLandlordData() {
        const data = getLandlordData();
        localStorage.setItem(LANDLORD_KEY, JSON.stringify(data));
        showMsg("Vermieterdaten gespeichert.", "success");
      }

      function populateTenantSelect() {
        const previousValue = tenantSelect.value;
        const rawActive = localStorage.getItem(ACTIVE_TENANT_KEY);
        let activeId = "";

        if (rawActive) {
          try {
            const activeTenant = JSON.parse(rawActive);
            activeId = String(getTenantId(activeTenant));
          } catch (_) {}
        }

        const openTenants = tenantsCache.filter(t => t.status !== "paid");

        tenantSelect.innerHTML = '<option value="">— Mieter auswählen —</option>';

        openTenants.forEach(t => {
          const option = document.createElement("option");
          option.value = String(getTenantId(t));
          option.textContent = `${t.name || "-"} | ${t.unit || "-"} | ${t.rent ?? 0} €`;
          tenantSelect.appendChild(option);
        });

        if (activeId && openTenants.some(t => String(getTenantId(t)) === activeId)) {
          tenantSelect.value = activeId;
        } else if (previousValue && openTenants.some(t => String(getTenantId(t)) === previousValue)) {
          tenantSelect.value = previousValue;
        }

        renderTenantInfo();
      }

      function getSelectedTenant() {
        const id = tenantSelect.value;
        return tenantsCache.find(t => String(getTenantId(t)) === String(id)) || null;
      }

      function renderTenantInfo() {
        const tenant = getSelectedTenant();

        if (!tenant) {
          tenantInfo.style.display = "none";
          tenantInfo.innerHTML = "";
          return;
        }

        const overdueDays = getOverdueDays(tenant);
        const dueDate = getLatestDueDate(tenant.dueDay);

        tenantInfo.style.display = "block";
        tenantInfo.innerHTML = `
          <strong>${tenant.name || "-"}</strong>
          Wohnung: ${tenant.unit || "-"} | Miete: ${tenant.rent ?? 0} € | Fälligkeit: ${formatDate(dueDate)}
          <br>
          Status: ${tenant.status === "paid" ? "Bezahlt" : "Nicht bezahlt"}${overdueDays ? ` | Überfällig seit ${overdueDays} Tagen` : ""}
        `;
      }

      function getLevelLabel(level) {
        if (level === "2") return "2. Mahnung";
        if (level === "3") return "Letzte Mahnung";
        return "1. Mahnung";
      }

      function buildMahnungText(tenant, level) {
        const landlord = getLandlordData();
        const overdueDays = getOverdueDays(tenant);
        const dueDate = getLatestDueDate(tenant.dueDay);
        const label = getLevelLabel(level);

        let intro = "";
        let deadline = "";

        if (level === "2") {
          intro = `trotz meiner bereits erfolgten 1. Mahnung ist die Miete für die unten genannte Wohnung weiterhin offen.`;
          deadline = "Ich fordere Sie daher erneut auf, den offenen Betrag innerhalb von 7 Tagen zu begleichen.";
        } else if (level === "3") {
          intro = `trotz meiner bisherigen Aufforderungen ist die Miete weiterhin nicht bei mir eingegangen.`;
          deadline = "Hiermit erhalten Sie die letzte Mahnung. Ich fordere Sie auf, den offenen Betrag spätestens innerhalb von 5 Tagen vollständig zu begleichen.";
        } else {
          intro = `die Miete für die unten genannte Wohnung ist trotz Fälligkeit bisher nicht eingegangen.`;
          deadline = "Bitte überweisen Sie den offenen Betrag innerhalb von 7 Tagen.";
        }

        const paymentBlock = landlord.payment
          ? `\nZahlungsinformationen:\n${landlord.payment}\n`
          : "";

        return `${landlord.name || "Vermieter / Verwaltung"}
${landlord.address || ""}

${formatDate(new Date())}

An:
${tenant.name || "-"}
Wohnung: ${tenant.unit || "-"}

Betreff: ${label} wegen offener Miete

Sehr geehrte Damen und Herren,

${intro}

Offener Betrag: ${tenant.rent ?? 0} €
Fälligkeit: ${formatDate(dueDate)}${overdueDays ? `
Überfällig seit: ${overdueDays} Tagen` : ""}

${deadline}${paymentBlock}
Sollte die Zahlung bereits erfolgt sein, betrachten Sie dieses Schreiben bitte als gegenstandslos.

Mit freundlichen Grüßen

${landlord.name || "Vermieter / Verwaltung"}`.trim();
      }

      function generateForSelected() {
        clearMsg();

        const tenant = getSelectedTenant();
        if (!tenant) {
          showMsg("Bitte zuerst einen Mieter auswählen.");
          return;
        }

        const text = buildMahnungText(tenant, mahnungLevel.value);
        previewText.value = text;
        localStorage.setItem(ACTIVE_TENANT_KEY, JSON.stringify(tenant));
        showMsg(`${getLevelLabel(mahnungLevel.value)} wurde generiert.`, "success");
      }

      function generateForAllOpen() {
        clearMsg();

        const openTenants = tenantsCache.filter(t => t.status !== "paid");
        if (!openTenants.length) {
          showMsg("Keine offenen Mieter gefunden.");
          return;
        }

        const texts = openTenants.map(t => buildMahnungText(t, mahnungLevel.value));
        previewText.value = texts.join("\n\n----------------------------------------\n\n");
        showMsg(`${texts.length} Mahnungen wurden generiert.`, "success");
      }

      async function copyText() {
        const text = previewText.value.trim();
        if (!text) {
          showMsg("Es gibt noch keinen generierten Text.");
          return;
        }

        try {
          await navigator.clipboard.writeText(text);
          showMsg("Text wurde kopiert.", "success");
        } catch (_) {
          showMsg("Kopieren nicht möglich.");
        }
      }

      function downloadText() {
        const text = previewText.value.trim();
        if (!text) {
          showMsg("Es gibt noch keinen generierten Text.");
          return;
        }

        const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "mahnung.txt";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      async function loadTenants() {
        if (!TENANTS_URL) {
          showMsg("config.js fehlt oder TENANTS_URL ist leer.");
          return;
        }

        try {
          const res = await fetch(TENANTS_URL, { method: "GET" });

          if (res.status === 401) {
            localStorage.removeItem("token");
            window.location.replace("./Login.html");
            return;
          }

          if (!res.ok) {
            const txt = await res.text();
            showMsg("Fehler beim Laden der Mieter: " + txt);
            return;
          }

          tenantsCache = await res.json();
          populateTenantSelect();
          clearMsg();
        } catch (err) {
          console.error("MAHNUNG LOAD TENANTS ERROR:", err);
          showMsg("Netzwerkfehler beim Laden der Mieter: " + err.message);
        }
      }

      saveLandlordBtn.addEventListener("click", saveLandlordData);
      tenantSelect.addEventListener("change", renderTenantInfo);
      generateSelectedBtn.addEventListener("click", generateForSelected);
      generateAllBtn.addEventListener("click", generateForAllOpen);
      copyBtn.addEventListener("click", copyText);
      downloadBtn.addEventListener("click", downloadText);

      loadLandlordData();
      loadTenants();
    });
  </script>
</body>
</html>
